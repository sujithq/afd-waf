name: Config Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      ref:
        description: Git ref with known-good config
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Apply known-good config
        shell: pwsh
        run: |
          ./scripts/deploy-config.ps1 -Environment ${{ inputs.environment }} -Mode Detection
