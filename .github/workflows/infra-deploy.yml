name: Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      iac:
        description: IaC stack
        required: true
        type: choice
        options: [terraform, bicep]
      run_config_deploy:
        description: Run Config Deploy after infrastructure deployment
        required: false
        type: boolean
        default: false
      apply_terraform:
        description: Apply Terraform after reviewing the saved plan
        required: false
        type: boolean
        default: false
      apply_confirmation:
        description: Required only if Apply Terraform is checked. Type apply-<environment>
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      environment:
        description: Target environment
        required: true
        type: string
      iac:
        description: IaC stack
        required: true
        type: string
      run_config_deploy:
        description: Run Config Deploy after infrastructure deployment
        required: false
        type: boolean
        default: false
      apply_terraform:
        description: Apply Terraform after reviewing the saved plan
        required: false
        type: boolean
        default: false
      apply_confirmation:
        description: Required only if Apply Terraform is true. Type apply-<environment>
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      tf_apply_requested: ${{ steps.plan_terraform.outputs.apply_requested }}
      tf_has_changes: ${{ steps.plan_terraform.outputs.has_changes }}
      tf_should_apply: ${{ steps.plan_terraform.outputs.should_apply }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        if: inputs.iac == 'terraform'
        with:
          terraform_version: 1.14.9

      - name: Upgrade Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Terraform backend
        if: inputs.iac == 'terraform'
        run: |
          az group create \
            --name ${{ vars.TF_BACKEND_RG }} \
            --location ${{ vars.TF_LOCATION }} \
            --only-show-errors 2>/dev/null || true
          if ! az storage account show \
              --name ${{ vars.TF_BACKEND_SA }} \
              --resource-group ${{ vars.TF_BACKEND_RG }} \
              --only-show-errors &>/dev/null; then
            az storage account create \
              --name ${{ vars.TF_BACKEND_SA }} \
              --resource-group ${{ vars.TF_BACKEND_RG }} \
              --location ${{ vars.TF_LOCATION }} \
              --sku Standard_LRS \
              --public-network-access Enabled \
              --allow-shared-key-access false \
              --only-show-errors
          fi
          az storage account update \
            --name ${{ vars.TF_BACKEND_SA }} \
            --resource-group ${{ vars.TF_BACKEND_RG }} \
            --public-network-access Enabled \
            --only-show-errors
          az storage container create \
            --name tfstate \
            --account-name ${{ vars.TF_BACKEND_SA }} \
            --auth-mode login \
            --only-show-errors 2>/dev/null || true

      - name: Verify Terraform backend access
        if: inputs.iac == 'terraform'
        shell: pwsh
        run: |
          ./scripts/test-terraform-backend-access.ps1 `
            -SubscriptionId "${{ vars.AZURE_SUBSCRIPTION_ID }}" `
            -BackendResourceGroup "${{ vars.TF_BACKEND_RG }}" `
            -BackendStorageAccount "${{ vars.TF_BACKEND_SA }}" `
            -ClientId "${{ vars.AZURE_CLIENT_ID }}" `
            -MaxAttempts 30 `
            -DelaySeconds 10

      - name: Deploy bicep
        if: inputs.iac == 'bicep'
        run: |
          az bicep install --version v0.42.1
          az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters @infra/bicep/env/${{ inputs.environment }}.parameters.json

      - name: Plan terraform
        id: plan_terraform
        if: inputs.iac == 'terraform'
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_location: ${{ vars.TF_LOCATION }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_name_prefix: ${{ vars.TF_NAME_PREFIX }}
          TF_VAR_waf_mode: Detection
          TF_VAR_apim_publisher_email: ${{ vars.APIM_PUBLISHER_EMAIL }}
          TF_VAR_apim_publisher_name: ${{ vars.APIM_PUBLISHER_NAME }}
        run: |
          cd infra/terraform
          terraform init -upgrade=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="key=${{ inputs.environment }}-infra.tfstate"
          RG_NAME="${TF_VAR_name_prefix}-${TF_VAR_environment}-rg"
          if az group show --name "$RG_NAME" &>/dev/null; then
            if ! terraform state show azurerm_resource_group.main &>/dev/null; then
              terraform import azurerm_resource_group.main \
                "/subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/$RG_NAME"
            fi
          fi
          set +e
          terraform plan -input=false -detailed-exitcode -out=tfplan
          PLAN_EXIT_CODE=$?
          set -e

          if [ "$PLAN_EXIT_CODE" -eq 1 ]; then
            echo "Terraform plan failed."
            exit 1
          fi

          APPLY_REQUESTED="false"
          if [ "${{ inputs.apply_terraform }}" = "true" ]; then
            APPLY_REQUESTED="true"
          fi

          HAS_CHANGES="false"
          if [ "$PLAN_EXIT_CODE" -eq 2 ]; then
            HAS_CHANGES="true"
          fi

          SHOULD_APPLY="false"
          if [ "$APPLY_REQUESTED" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
            SHOULD_APPLY="true"
          fi

          {
            echo "apply_requested=$APPLY_REQUESTED"
            echo "has_changes=$HAS_CHANGES"
            echo "should_apply=$SHOULD_APPLY"
          } >> "$GITHUB_OUTPUT"

          if [ "$HAS_CHANGES" = "true" ]; then
            echo "Terraform changes detected."
          else
            echo "No Terraform changes detected."
          fi

          terraform show -no-color tfplan | tee terraform-plan.txt
          date -u +%s > plan-created-at.txt

          {
            echo "## Terraform infra plan (${{ inputs.environment }})"
            echo ""
            echo "Apply requested: \`$APPLY_REQUESTED\`"
            echo "Terraform changes detected: \`$HAS_CHANGES\`"
            echo "Should apply saved plan: \`$SHOULD_APPLY\`"
            echo ""
            if [ "$HAS_CHANGES" = "false" ]; then
              echo "No Terraform changes detected. Approval and apply jobs will be skipped."
              echo ""
            elif [ "$SHOULD_APPLY" = "true" ]; then
              echo "Terraform changes detected. The approve job will wait for the ${{ inputs.environment }} environment review before apply can start."
              echo ""
            else
              echo "Terraform changes detected, but apply was not requested for this run."
              echo ""
            fi
            echo '```terraform'
            cat terraform-plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Terraform plan artifact
        if: inputs.iac == 'terraform' && steps.plan_terraform.outputs.should_apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: infra-tfplan-${{ inputs.environment }}
          path: |
            infra/terraform/tfplan
            infra/terraform/terraform-plan.txt
            infra/terraform/plan-created-at.txt
          retention-days: 1

  no_changes:
    needs: plan
    if: inputs.iac == 'terraform' && needs.plan.outputs.tf_apply_requested == 'true' && needs.plan.outputs.tf_has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped apply
        run: |
          echo "Terraform reported no infra changes, so approval and apply were skipped."
          {
            echo "## Infra apply skipped"
            echo ""
            echo "Terraform reported no infra changes for ${{ inputs.environment }}. The saved-plan approval and apply jobs are intentionally skipped for no-op plans."
          } >> "$GITHUB_STEP_SUMMARY"

  approve:
    needs: plan
    if: inputs.iac == 'terraform' && needs.plan.outputs.tf_should_apply == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Confirm saved Terraform plan review
        run: |
          echo "Review the Terraform plan in the plan job summary before approving this job."
          echo "The apply job will download and apply the saved tfplan artifact from this workflow run."

  apply:
    needs: [plan, approve]
    if: inputs.iac == 'terraform' && needs.plan.outputs.tf_should_apply == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.14.9

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: infra-tfplan-${{ inputs.environment }}
          path: infra/terraform

      - name: Apply saved terraform plan
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_location: ${{ vars.TF_LOCATION }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_name_prefix: ${{ vars.TF_NAME_PREFIX }}
          TF_VAR_waf_mode: Detection
          TF_VAR_apim_publisher_email: ${{ vars.APIM_PUBLISHER_EMAIL }}
          TF_VAR_apim_publisher_name: ${{ vars.APIM_PUBLISHER_NAME }}
        run: |
          if [ "${{ inputs.apply_confirmation }}" != "apply-${{ inputs.environment }}" ]; then
            echo "Refusing to apply. Set apply_confirmation to apply-${{ inputs.environment }}."
            exit 1
          fi

          cd infra/terraform
          PLAN_CREATED_AT=$(cat plan-created-at.txt)
          NOW=$(date -u +%s)
          MAX_PLAN_AGE_SECONDS=3600
          PLAN_AGE_SECONDS=$((NOW - PLAN_CREATED_AT))
          if [ "$PLAN_AGE_SECONDS" -gt "$MAX_PLAN_AGE_SECONDS" ]; then
            echo "Refusing to apply: saved Terraform plan is older than 60 minutes. Rerun the workflow to create a fresh plan."
            exit 1
          fi

          terraform init -upgrade=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="key=${{ inputs.environment }}-infra.tfstate"
          terraform apply -input=false tfplan
          echo "--- Infra outputs (pass to config-deploy) ---"
          terraform output -json | jq '{waf_policy_id: .waf_policy_id.value, waf_policy_name: .waf_policy_name.value, domain_waf_policy_ids: .domain_waf_policy_ids.value, domain_waf_policy_names: .domain_waf_policy_names.value}'

  config-deploy:
    needs: [plan, apply]
    if: always() && inputs.run_config_deploy == true && (inputs.iac != 'terraform' || needs.apply.result == 'success' || (needs.plan.outputs.tf_apply_requested == 'true' && needs.plan.outputs.tf_has_changes == 'false'))
    uses: ./.github/workflows/config-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      iac: ${{ inputs.iac }}
      apply_terraform: false
      apply_confirmation: ""
    secrets: inherit
