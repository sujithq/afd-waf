name: Infra Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      iac:
        description: IaC stack
        required: true
        type: choice
        options: [bicep, terraform]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        if: inputs.iac == 'terraform'
        with:
          terraform_version: 1.14.9

      - name: Upgrade Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy bicep
        if: inputs.iac == 'bicep'
        run: |
          az bicep install --version v0.42.1
          az deployment group create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/main.bicep \
            --parameters @infra/bicep/env/${{ inputs.environment }}.parameters.json

      - name: Deploy terraform
        if: inputs.iac == 'terraform'
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_location: ${{ vars.TF_LOCATION }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_name_prefix: ${{ vars.TF_NAME_PREFIX }}
          TF_VAR_waf_mode: Detection
          TF_VAR_apim_publisher_email: ${{ vars.APIM_PUBLISHER_EMAIL }}
          TF_VAR_apim_publisher_name: ${{ vars.APIM_PUBLISHER_NAME }}
        run: |
          cd infra/terraform
          terraform init -upgrade=false
          terraform apply -auto-approve -input=false
          echo "--- Infra outputs (pass to config-deploy) ---"
          terraform output -json | jq '{waf_policy_id: .waf_policy_id.value, waf_policy_name: .waf_policy_name.value}'
