name: Infra Validate

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    paths:
      - 'infra/**'
      - 'config/waf/**'
      - 'scripts/check-avm-versions.ps1'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.14.9

      - name: Upgrade Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Bicep lint
        run: |
          az bicep install --version v0.42.1
          az bicep build --file infra/bicep/main.bicep
          az bicep build --file infra/bicep-config/main.bicep

      - name: Terraform fmt and validate
        run: |
          cd infra/terraform
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: Terraform config fmt and validate
        run: |
          cd infra/terraform-config
          terraform init -backend=false
          terraform fmt -check -recursive
          terraform validate

      - name: AVM governance marker check
        shell: pwsh
        run: ./scripts/check-avm-versions.ps1 -RepoRoot .
