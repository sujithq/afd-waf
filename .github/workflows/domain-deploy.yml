name: Domain Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      config_path:
        description: Domain config file
        required: true
        type: string
        default: config/waf/api-policies.json
      dry_run:
        description: Print Azure CLI commands without changing Azure
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy-domains:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Upgrade Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Create and bind AFD custom domains
        shell: pwsh
        env:
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          $resourceGroupName = "${{ vars.TF_NAME_PREFIX }}-${{ inputs.environment }}-rg"
          $params = @{
            Environment = "${{ inputs.environment }}"
            ConfigPath = "${{ inputs.config_path }}"
            SubscriptionId = "${{ vars.AZURE_SUBSCRIPTION_ID }}"
            ResourceGroupName = $resourceGroupName
            NamePrefix = "${{ vars.TF_NAME_PREFIX }}"
          }

          if ($env:DRY_RUN -eq 'true') {
            ./scripts/deploy-afd-domains.ps1 @params -WhatIf
          }
          else {
            ./scripts/deploy-afd-domains.ps1 @params
          }