name: Config Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      iac:
        description: IaC stack
        required: false
        type: choice
        options: [terraform, bicep]
        default: terraform
      apply_terraform:
        description: Apply Terraform after reviewing the saved plan
        required: false
        type: boolean
        default: false
      apply_confirmation:
        description: Required only if Apply Terraform is checked. Type apply-<environment>
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      environment:
        description: Target environment
        required: true
        type: string
      iac:
        description: IaC stack
        required: false
        type: string
        default: terraform
      apply_terraform:
        description: Apply Terraform after reviewing the saved plan
        required: false
        type: boolean
        default: false
      apply_confirmation:
        description: Required only if Apply Terraform is true. Type apply-<environment>
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      tf_apply_requested: ${{ steps.plan_outputs.outputs.apply_requested }}
      tf_change_count: ${{ steps.plan_outputs.outputs.change_count }}
      tf_has_changes: ${{ steps.plan_outputs.outputs.has_changes }}
      tf_should_apply: ${{ steps.plan_outputs.outputs.should_apply }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        if: inputs.iac != 'bicep'
        with:
          terraform_version: 1.14.9

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI Front Door extension
        run: |
          az config set extension.dynamic_install_allow_preview=false
          az extension add --name front-door --upgrade

      - name: Resolve WAF policy details from Azure
        if: inputs.iac != 'bicep'
        run: |
          ENV="${{ inputs.environment }}"
          PREFIX="${{ vars.TF_NAME_PREFIX }}"
          WAF_NAME=$(echo "${PREFIX}waf${ENV}" | tr '[:upper:]' '[:lower:]' | tr -d '-')
          RG="${PREFIX}-${ENV}-rg"
          # Verify policy exists; CLI ID output can lowercase static ARM path segments,
          # which breaks strict Terraform import ID parsing in newer azurerm versions.
          az network front-door waf-policy show \
            --name "$WAF_NAME" \
            --resource-group "$RG" \
            --query "name" --output tsv >/dev/null

          for DOMAIN_NAME in $(jq -r '.domainPolicies | keys[]?' config/waf/api-policies.json); do
            DOMAIN_WAF_NAME=$(echo "${PREFIX}waf${ENV}${DOMAIN_NAME}" | tr '[:upper:]' '[:lower:]' | tr -d '-')
            az network front-door waf-policy show \
              --name "$DOMAIN_WAF_NAME" \
              --resource-group "$RG" \
              --query "name" --output tsv >/dev/null
          done

          # Emit canonical-cased ARM ID for Terraform import compatibility.
          WAF_ID="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RG}/providers/Microsoft.Network/frontDoorWebApplicationFirewallPolicies/${WAF_NAME}"
          echo "TF_VAR_waf_policy_name=${WAF_NAME}" >> "$GITHUB_ENV"
          echo "TF_VAR_resource_group_name=${RG}" >> "$GITHUB_ENV"
          echo "TF_VAR_waf_policy_id=${WAF_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_name_prefix=${PREFIX}" >> "$GITHUB_ENV"
          echo "TF_VAR_subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"

      - name: Verify Terraform backend access
        if: inputs.iac != 'bicep'
        shell: pwsh
        run: |
          ./scripts/test-terraform-backend-access.ps1 `
            -SubscriptionId "${{ vars.AZURE_SUBSCRIPTION_ID }}" `
            -BackendResourceGroup "${{ vars.TF_BACKEND_RG }}" `
            -BackendStorageAccount "${{ vars.TF_BACKEND_SA }}" `
            -ClientId "${{ vars.AZURE_CLIENT_ID }}" `
            -MaxAttempts 30 `
            -DelaySeconds 10

      - name: Plan WAF config via Terraform
        id: plan_terraform
        if: inputs.iac != 'bicep'
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_name_prefix: ${{ vars.TF_NAME_PREFIX }}
          TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd infra/terraform-config
          terraform init -upgrade=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="key=${{ inputs.environment }}-config.tfstate"
          set +e
          terraform plan -input=false -detailed-exitcode \
            -var-file="env/${{ inputs.environment }}.tfvars" \
            -out=tfplan
          PLAN_EXIT_CODE=$?
          set -e

          if [ "$PLAN_EXIT_CODE" -eq 1 ]; then
            echo "Terraform plan failed."
            exit 1
          fi

          APPLY_REQUESTED="false"
          if [ "${{ inputs.apply_terraform }}" = "true" ]; then
            APPLY_REQUESTED="true"
          fi

          CHANGE_COUNT=$(terraform show -json tfplan | jq '[.resource_changes[]? | select((.change.actions // []) | any(. != "no-op" and . != "read"))] | length')

          HAS_CHANGES="false"
          if [ "$CHANGE_COUNT" -gt 0 ]; then
            HAS_CHANGES="true"
          fi

          SHOULD_APPLY="false"
          if [ "$APPLY_REQUESTED" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
            SHOULD_APPLY="true"
          fi

          echo "$APPLY_REQUESTED" > apply-requested.txt
          echo "$CHANGE_COUNT" > change-count.txt
          echo "$HAS_CHANGES" > has-changes.txt
          echo "$SHOULD_APPLY" > should-apply.txt

          if [ "$HAS_CHANGES" = "true" ]; then
            echo "Terraform changes detected."
          else
            echo "No Terraform changes detected."
          fi

          terraform show -no-color tfplan | tee terraform-plan.txt
          date -u +%s > plan-created-at.txt

          {
            echo "## Terraform config plan (${{ inputs.environment }})"
            echo ""
            echo "Apply requested: \`$APPLY_REQUESTED\`"
            echo "Plan resource change count: \`$CHANGE_COUNT\`"
            echo "Terraform changes detected: \`$HAS_CHANGES\`"
            echo "Should apply saved plan: \`$SHOULD_APPLY\`"
            echo ""
            if [ "$HAS_CHANGES" = "false" ]; then
              echo "No Terraform changes detected. Approval and apply jobs will be skipped."
              echo ""
            elif [ "$SHOULD_APPLY" = "true" ]; then
              echo "Terraform changes detected. The approve job will wait for the ${{ inputs.environment }} environment review before apply can start."
              echo ""
            else
              echo "Terraform changes detected, but apply was not requested for this run."
              echo ""
            fi
            echo '```terraform'
            cat terraform-plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set Terraform plan outputs
        id: plan_outputs
        if: inputs.iac != 'bicep'
        run: |
          cd infra/terraform-config
          APPLY_REQUESTED=$(cat apply-requested.txt)
          CHANGE_COUNT=$(cat change-count.txt)
          HAS_CHANGES=$(cat has-changes.txt)
          SHOULD_APPLY=$(cat should-apply.txt)
          {
            echo "apply_requested=$APPLY_REQUESTED"
            echo "change_count=$CHANGE_COUNT"
            echo "has_changes=$HAS_CHANGES"
            echo "should_apply=$SHOULD_APPLY"
          } >> "$GITHUB_OUTPUT"

          echo "Plan decision: apply_requested=$APPLY_REQUESTED, change_count=$CHANGE_COUNT, has_changes=$HAS_CHANGES, should_apply=$SHOULD_APPLY"

      - name: Upload Terraform plan artifact
        if: inputs.iac != 'bicep' && steps.plan_outputs.outputs.should_apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: config-tfplan-${{ inputs.environment }}
          path: |
            infra/terraform-config/tfplan
            infra/terraform-config/terraform-plan.txt
            infra/terraform-config/plan-created-at.txt
          retention-days: 1

      - name: Deploy WAF config via Bicep
        if: inputs.iac == 'bicep'
        run: |
          ENV="${{ inputs.environment }}"
          PREFIX="${{ vars.TF_NAME_PREFIX }}"
          WAF_NAME="${PREFIX}-waf-${ENV}"
          RG="${PREFIX}-${ENV}-rg"

          # Verify policy exists before attempting deployment
          az network front-door waf-policy show \
            --name "$WAF_NAME" \
            --resource-group "$RG" \
            --query "name" --output tsv >/dev/null

          # Transform config JSON files to ARM ruleGroupOverrides format.
          # Mirrors the Terraform waf-rules module logic: collects unique rules from
          # both exclusions.json and rule-overrides.json, attaches per-rule exclusions.
          cat > /tmp/build-waf-params.py << 'PYEOF'
          import json
          import sys

          env = sys.argv[1]
          excl_data = json.load(open(f'config/waf/{env}/exclusions.json'))
          ovrd_data = json.load(open(f'config/waf/{env}/rule-overrides.json'))

          override_map = {}
          for grp in ovrd_data.get('overrides', []):
              for r in grp.get('rules', []):
                  override_map[f"{grp['ruleGroup']}.{r['ruleId']}"] = r['action']

          rules_per_group = {}
          for excl in excl_data.get('exclusions', []):
              rules_per_group.setdefault(excl['ruleGroup'], set()).add(excl['ruleId'])
          for grp in ovrd_data.get('overrides', []):
              for r in grp.get('rules', []):
                  rules_per_group.setdefault(grp['ruleGroup'], set()).add(r['ruleId'])

          exclusions_by_rule = {}
          for excl in excl_data.get('exclusions', []):
              key = f"{excl['ruleGroup']}.{excl['ruleId']}"
              exclusions_by_rule.setdefault(key, []).append({
                  'matchVariable': excl['matchVariable'],
                  'selectorMatchOperator': excl['selectorMatchOperator'],
                  'selector': excl['selector'],
              })

          rgo = []
          for rg, rule_ids in rules_per_group.items():
              rules = []
              for rid in sorted(rule_ids):
                  # Default to AnomalyScoring (correct for DRS 2.1 anomaly-scoring mode)
                  # unless explicitly overridden in rule-overrides.json.
                  action = override_map.get(f"{rg}.{rid}", 'AnomalyScoring')
                  excls = exclusions_by_rule.get(f"{rg}.{rid}", [])
                  rule = {'ruleId': rid, 'enabledState': 'Enabled', 'action': action}
                  if excls:
                      rule['exclusions'] = excls
                  rules.append(rule)
              rgo.append({'ruleGroupName': rg, 'rules': rules})

          print(json.dumps(rgo))
          PYEOF

          RULE_GROUP_OVERRIDES=$(python3 /tmp/build-waf-params.py "$ENV")

          az bicep install --version v0.42.1
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/bicep-config/main.bicep \
            --parameters @infra/bicep-config/env/${{ inputs.environment }}.parameters.json \
            --parameters wafPolicyName="$WAF_NAME" \
            --parameters "ruleGroupOverrides=$RULE_GROUP_OVERRIDES"

  no_changes:
    needs: plan
    if: inputs.iac != 'bicep' && needs.plan.outputs.tf_apply_requested == 'true' && needs.plan.outputs.tf_has_changes != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Explain skipped apply
        run: |
          echo "Terraform reported no config changes, so approval and apply were skipped."
          {
            echo "## Config apply skipped"
            echo ""
            echo "Terraform reported no config changes for ${{ inputs.environment }}. The saved-plan approval and apply jobs are intentionally skipped for no-op plans."
          } >> "$GITHUB_STEP_SUMMARY"

  approve:
    needs: plan
    if: inputs.iac != 'bicep' && needs.plan.outputs.tf_should_apply == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Confirm saved Terraform plan review
        run: |
          echo "Review the Terraform plan in the plan job summary before approving this job."
          echo "The apply job will download and apply the saved tfplan artifact from this workflow run."

  apply:
    needs: [plan, approve]
    if: inputs.iac != 'bicep' && needs.plan.outputs.tf_should_apply == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.14.9

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Download Terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: config-tfplan-${{ inputs.environment }}
          path: infra/terraform-config

      - name: Apply saved WAF config plan
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_name_prefix: ${{ vars.TF_NAME_PREFIX }}
          TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ "${{ inputs.apply_confirmation }}" != "apply-${{ inputs.environment }}" ]; then
            echo "Refusing to apply. Set apply_confirmation to apply-${{ inputs.environment }}."
            exit 1
          fi

          cd infra/terraform-config
          PLAN_CREATED_AT=$(cat plan-created-at.txt)
          NOW=$(date -u +%s)
          MAX_PLAN_AGE_SECONDS=3600
          PLAN_AGE_SECONDS=$((NOW - PLAN_CREATED_AT))
          if [ "$PLAN_AGE_SECONDS" -gt "$MAX_PLAN_AGE_SECONDS" ]; then
            echo "Refusing to apply: saved Terraform plan is older than 60 minutes. Rerun the workflow to create a fresh plan."
            exit 1
          fi

          terraform init -upgrade=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="key=${{ inputs.environment }}-config.tfstate"
          terraform apply -input=false tfplan
