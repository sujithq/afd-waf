name: Config Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      mode:
        description: WAF mode
        required: true
        type: choice
        options: [Detection, Prevention]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.14.9

      - name: Upgrade Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy WAF config via Terraform
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_location: ${{ vars.TF_LOCATION }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_name_prefix: ${{ vars.TF_NAME_PREFIX }}
          TF_VAR_waf_mode: ${{ inputs.mode }}
          TF_VAR_apim_publisher_email: ${{ vars.APIM_PUBLISHER_EMAIL }}
          TF_VAR_apim_publisher_name: ${{ vars.APIM_PUBLISHER_NAME }}
        run: |
          cd infra/terraform
          terraform init -upgrade=false
          terraform apply -auto-approve -input=false -target=module.waf

      - name: Smoke test
        if: inputs.environment == 'dev' || inputs.environment == 'test'
        shell: pwsh
        run: |
          ./scripts/smoke-odata.ps1 -BaseUrl "${{ vars.AFD_BASE_URL }}"

      - name: Publish config manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: waf-config-manifest-${{ inputs.environment }}
          path: config/waf/${{ inputs.environment }}/
