name: Config Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
  push:
    branches: [main]
    paths:
      - 'config/waf/**'
      - 'infra/terraform-config/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.14.9

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Derive WAF policy details from naming convention
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          PREFIX="${{ vars.TF_NAME_PREFIX }}"
          # Derive WAF policy name: lowercase(prefix + "waf" + env), hyphens removed
          WAF_NAME=$(echo "${PREFIX}waf${ENV}" | tr '[:upper:]' '[:lower:]' | tr -d '-')
          RG="${PREFIX}-${ENV}-rg"
          WAF_ID="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RG}/providers/Microsoft.Network/FrontDoorWebApplicationFirewallPolicies/${WAF_NAME}"
          echo "TF_VAR_waf_policy_name=${WAF_NAME}" >> "$GITHUB_ENV"
          echo "TF_VAR_resource_group_name=${RG}" >> "$GITHUB_ENV"
          echo "TF_VAR_waf_policy_id=${WAF_ID}" >> "$GITHUB_ENV"

      - name: Deploy WAF config via Terraform
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ inputs.environment || 'dev' }}
        run: |
          cd infra/terraform-config
          terraform init -upgrade=false
          terraform apply -auto-approve -input=false \
            -var-file="env/${{ inputs.environment || 'dev' }}.tfvars"
