name: Config Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      iac:
        description: IaC stack
        required: false
        type: choice
        options: [terraform, bicep]
        default: terraform
  workflow_call:
    inputs:
      environment:
        description: Target environment
        required: true
        type: string
      iac:
        description: IaC stack
        required: false
        type: string
        default: terraform

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        if: inputs.iac != 'bicep'
        with:
          terraform_version: 1.14.9

      - name: Azure login
        uses: Azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve WAF policy details from Azure
        if: inputs.iac != 'bicep'
        run: |
          ENV="${{ inputs.environment }}"
          PREFIX="${{ vars.TF_NAME_PREFIX }}"
          WAF_NAME=$(echo "${PREFIX}waf${ENV}" | tr '[:upper:]' '[:lower:]' | tr -d '-')
          RG="${PREFIX}-${ENV}-rg"
          # Verify policy exists; CLI ID output can lowercase static ARM path segments,
          # which breaks strict Terraform import ID parsing in newer azurerm versions.
          az network front-door waf-policy show \
            --name "$WAF_NAME" \
            --resource-group "$RG" \
            --query "name" --output tsv >/dev/null

          for DOMAIN_NAME in $(jq -r '.domainPolicies | keys[]?' config/waf/api-policies.json); do
            DOMAIN_WAF_NAME=$(echo "${PREFIX}waf${ENV}${DOMAIN_NAME}" | tr '[:upper:]' '[:lower:]' | tr -d '-')
            az network front-door waf-policy show \
              --name "$DOMAIN_WAF_NAME" \
              --resource-group "$RG" \
              --query "name" --output tsv >/dev/null
          done

          # Emit canonical-cased ARM ID for Terraform import compatibility.
          WAF_ID="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RG}/providers/Microsoft.Network/frontDoorWebApplicationFirewallPolicies/${WAF_NAME}"
          echo "TF_VAR_waf_policy_name=${WAF_NAME}" >> "$GITHUB_ENV"
          echo "TF_VAR_resource_group_name=${RG}" >> "$GITHUB_ENV"
          echo "TF_VAR_waf_policy_id=${WAF_ID}" >> "$GITHUB_ENV"
          echo "TF_VAR_name_prefix=${PREFIX}" >> "$GITHUB_ENV"
          echo "TF_VAR_subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" >> "$GITHUB_ENV"

      - name: Verify Terraform backend access
        if: inputs.iac != 'bicep'
        shell: pwsh
        run: |
          ./scripts/test-terraform-backend-access.ps1 `
            -SubscriptionId "${{ vars.AZURE_SUBSCRIPTION_ID }}" `
            -BackendResourceGroup "${{ vars.TF_BACKEND_RG }}" `
            -BackendStorageAccount "${{ vars.TF_BACKEND_SA }}" `
            -ClientId "${{ vars.AZURE_CLIENT_ID }}" `
            -MaxAttempts 30 `
            -DelaySeconds 10

      - name: Deploy WAF config via Terraform
        if: inputs.iac != 'bicep'
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_environment: ${{ inputs.environment }}
          TF_VAR_name_prefix: ${{ vars.TF_NAME_PREFIX }}
          TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          cd infra/terraform-config
          terraform init -upgrade=false \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="key=${{ inputs.environment }}-config.tfstate"
          terraform apply -auto-approve -input=false \
            -var-file="env/${{ inputs.environment }}.tfvars"

      - name: Deploy WAF config via Bicep
        if: inputs.iac == 'bicep'
        run: |
          ENV="${{ inputs.environment }}"
          PREFIX="${{ vars.TF_NAME_PREFIX }}"
          WAF_NAME="${PREFIX}-waf-${ENV}"
          RG="${PREFIX}-${ENV}-rg"

          # Verify policy exists before attempting deployment
          az network front-door waf-policy show \
            --name "$WAF_NAME" \
            --resource-group "$RG" \
            --query "name" --output tsv >/dev/null

          # Transform config JSON files to ARM ruleGroupOverrides format.
          # Mirrors the Terraform waf-rules module logic: collects unique rules from
          # both exclusions.json and rule-overrides.json, attaches per-rule exclusions.
          cat > /tmp/build-waf-params.py << 'PYEOF'
          import json
          import sys

          env = sys.argv[1]
          excl_data = json.load(open(f'config/waf/{env}/exclusions.json'))
          ovrd_data = json.load(open(f'config/waf/{env}/rule-overrides.json'))

          override_map = {}
          for grp in ovrd_data.get('overrides', []):
              for r in grp.get('rules', []):
                  override_map[f"{grp['ruleGroup']}.{r['ruleId']}"] = r['action']

          rules_per_group = {}
          for excl in excl_data.get('exclusions', []):
              rules_per_group.setdefault(excl['ruleGroup'], set()).add(excl['ruleId'])
          for grp in ovrd_data.get('overrides', []):
              for r in grp.get('rules', []):
                  rules_per_group.setdefault(grp['ruleGroup'], set()).add(r['ruleId'])

          exclusions_by_rule = {}
          for excl in excl_data.get('exclusions', []):
              key = f"{excl['ruleGroup']}.{excl['ruleId']}"
              exclusions_by_rule.setdefault(key, []).append({
                  'matchVariable': excl['matchVariable'],
                  'selectorMatchOperator': excl['selectorMatchOperator'],
                  'selector': excl['selector'],
              })

          rgo = []
          for rg, rule_ids in rules_per_group.items():
              rules = []
              for rid in sorted(rule_ids):
                  # Default to AnomalyScoring (correct for DRS 2.1 anomaly-scoring mode)
                  # unless explicitly overridden in rule-overrides.json.
                  action = override_map.get(f"{rg}.{rid}", 'AnomalyScoring')
                  excls = exclusions_by_rule.get(f"{rg}.{rid}", [])
                  rule = {'ruleId': rid, 'enabledState': 'Enabled', 'action': action}
                  if excls:
                      rule['exclusions'] = excls
                  rules.append(rule)
              rgo.append({'ruleGroupName': rg, 'rules': rules})

          print(json.dumps(rgo))
          PYEOF

          RULE_GROUP_OVERRIDES=$(python3 /tmp/build-waf-params.py "$ENV")

          az bicep install --version v0.42.1
          az deployment group create \
            --resource-group "$RG" \
            --template-file infra/bicep-config/main.bicep \
            --parameters @infra/bicep-config/env/${{ inputs.environment }}.parameters.json \
            --parameters wafPolicyName="$WAF_NAME" \
            --parameters "ruleGroupOverrides=$RULE_GROUP_OVERRIDES"
