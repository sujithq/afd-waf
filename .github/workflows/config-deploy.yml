# DEPRECATED: This workflow is no longer used.
# WAF configuration is now deployed via IaC through the infra-deploy.yml workflow.
# Changes to config/waf/** files are automatically applied when running Terraform.
# This workflow and the deploy-config.ps1 script are kept for reference only.
#
# To deploy WAF configuration changes:
# 1. Update config/waf/{environment}/exclusions.json or rule-overrides.json
# 2. Run the "Infra Deploy" workflow with iac=terraform
# 3. Terraform will read the JSON files and apply changes to the WAF policy

name: Config Deploy (DEPRECATED)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, test, prod]
      mode:
        description: WAF mode
        required: true
        type: choice
        options: [Detection, Prevention]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Deprecation warning
        run: |
          echo "::warning::This workflow is deprecated. Use 'Infra Deploy' with iac=terraform instead."
          echo "::warning::WAF configuration is now managed through Terraform IaC."
          exit 1
