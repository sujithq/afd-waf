name: Config Validate

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    paths:
      - 'config/waf/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate JSON payloads and security guardrails
        shell: pwsh
        run: |
          $envs = @('dev','test','prod')
          $schemaPath = "config/waf/schema/waf-tuning.schema.json"

          if (!(Test-Path $schemaPath)) {
            throw "Missing schema file: $schemaPath"
          }

          foreach ($e in $envs) {
            $exc = "config/waf/$e/exclusions.json"
            $ovr = "config/waf/$e/rule-overrides.json"

            if (!(Test-Path $exc)) {
              throw "Missing exclusions file: $exc"
            }

            if (!(Test-Path $ovr)) {
              throw "Missing overrides file: $ovr"
            }

            Get-Content $exc | ConvertFrom-Json | Out-Null
            Get-Content $ovr | ConvertFrom-Json | Out-Null

            $isValid = Test-Json -Path $exc -SchemaFile $schemaPath
            if (-not $isValid) {
              throw "Schema validation failed for $exc"
            }
          }

          $all = Get-ChildItem config/waf -Recurse -File | ForEach-Object { Get-Content $_.FullName -Raw }
          foreach ($txt in $all) {
            if ($txt -match '"ruleId"\s*:\s*"\*"') {
              throw "Wildcard ruleId is not allowed"
            }
          }
