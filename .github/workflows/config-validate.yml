name: Config Validate

on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    paths:
      - 'config/waf/**'
      - 'scripts/show-effective-waf-config.ps1'
      - 'scripts/test-waf-config.ps1'
      - '.github/workflows/config-validate.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate JSON payloads and security guardrails
        shell: pwsh
        run: |
          ./scripts/test-waf-config.ps1

      - name: Summarize effective WAF config
        shell: pwsh
        run: |
          $environments = @('dev', 'test', 'prod')

          "## Effective WAF Config" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          'This preview is generated from `config/waf/base/`, `config/waf/{env}/`, `config/waf/{env}/apis/{api}/`, and `config/waf/api-policies.json`.' >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY

          foreach ($environment in $environments) {
            "### $environment" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
            "``````text" >> $env:GITHUB_STEP_SUMMARY
            ./scripts/show-effective-waf-config.ps1 -Environment $environment 2>&1 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            "``````" >> $env:GITHUB_STEP_SUMMARY
            "" >> $env:GITHUB_STEP_SUMMARY
          }
